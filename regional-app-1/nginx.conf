server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve existing assets (JS, CSS, images, remoteEntry, etc.)
    # Base path
    location /rad/regional-app-1/ {
        # If a real file, serve it; else fallback to SPA entry
        try_files $uri $uri/ /rad/regional-app-1/index.html;
    }

    # (Optional) explicit remoteEntry to avoid accidental fallback masking
    location = /rad/regional-app-1/remoteEntry.js {
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
    }
}
